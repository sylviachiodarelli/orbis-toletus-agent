name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore tests/Orbis.ToletusAgent.Tests/Orbis.ToletusAgent.Tests.csproj

      - name: Build
        run: dotnet build tests/Orbis.ToletusAgent.Tests/Orbis.ToletusAgent.Tests.csproj --no-restore -c Release

      - name: Test
        run: dotnet test tests/Orbis.ToletusAgent.Tests/Orbis.ToletusAgent.Tests.csproj --no-build -c Release
