name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build installer
        shell: pwsh
        run: ./installer/build-release.ps1

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/OrbisToletusAgent-Setup-v0.1.1.exe
            dist/OrbisToletusAgent-win-x64-v0.1.1.zip
